name: Update Top Clans

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      

      - run: node update-clans.js
        env:
          COC_TOKEN: ${{ secrets.COC_TOKEN }}

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add top_clans.json

          git diff --staged --quiet || (
            git commit -m "Auto update clans"
            git push
          )
